name: Deploy Order API to ECS Fargate

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: ecs-fargate-order-api
  ECS_CLUSTER: order-api-cluster
  ECS_SERVICE: order-api-service
  CONTAINER_NAME: order-api-container

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::647097321691:role/ecs-fargate-order-api-github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        run: |
          IMAGE_URI=647097321691.dkr.ecr.us-east-1.amazonaws.com/${{ env.ECR_REPOSITORY }}
          docker buildx build \
            --platform linux/amd64 \
            -t $IMAGE_URI:latest \
            -t $IMAGE_URI:${{ github.sha }} \
            --push .

      - name: Update ECS service
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}